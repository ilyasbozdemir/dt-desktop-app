appId: dev.ilyasbozdemir.dtasistan
productName: DT Asistan Lite
fileAssociations:
  - ext: dtal
    name: DT Asistan Lite Proje Dosyası
    description: DT Asistan Lite Proje Dosyası
    role: Editor
    icon: build/icon.png
  - ext: dta
    name: Doğrudan Temin Asistan Veri Dosyası (Eski)
    description: DT Asistan Lite Veri Dosyası
    role: Editor
    icon: build/icon.png
  - ext: dtm
    name: Doğrudan Temin Çalışma Dosyası Lite
    description: DT Asistan Lite Çalışma Dosyası
    role: Editor
    icon: build/icon.png
  - ext: dte
    name: Doğrudan Temin Veri Aktarım Dosyası Lite
    description: DT Asistan Lite Veri Aktarım Dosyası
    role: Editor
    icon: build/icon.png
directories:
  buildResources: build
files:

  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  - from: resources/
    to: .
    filter:
      - '**/*'


win:
  executableName: DTAsistan
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: DT Asistan Lite
  uninstallDisplayName: DT Asistan Lite
  createDesktopShortcut: always
  include: build/installer.nsh
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: true
publish:
  provider: github
  owner: ilyasbozdemir
  repo: dt-asistan-desktop-app
  updaterCacheDirName: dt-asistan-desktop-app-updater
